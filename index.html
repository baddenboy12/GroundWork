<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta id="viewport-meta" name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- CSP is applied server-side via headers for web; omitted here for Capacitor native compatibility -->

    <title>GroundWork</title>
    <meta name="description" content="" />
    <link rel="icon" href="/icon/icon-192.png" />
    <!-- PWA -->
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#0f1117" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="GroundWork" />
    <link rel="apple-touch-icon" href="/icon/icon-192.png" />
    <meta property="og:title" content="GroundWork" />
    <meta property="og:description" content="" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/icon/icon-512.png" />
    <meta property="og:image:type" content="image/png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="/icon/icon-512.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300..700&family=Geist+Mono:wght@100..900&family=Geist:wght@100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Noto+Serif:ital,wght@0,100..900;1,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=DM+Serif+Display:ital@0;1&family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&display=swap"
      rel="stylesheet"
      crossorigin
    />

    <!-- Detect dark mode preference and set the class before next-themes loads. This avoids a flash of unstyled content (FOUC) when the page loads. -->
    <script>
      (function () {
        try {
          var theme = localStorage.getItem("theme");
          if (theme === "system" || !theme) {
            var prefersDark = window.matchMedia(
              "(prefers-color-scheme: dark)",
            ).matches;
            theme = prefersDark ? "dark" : "light";
          }
          document.documentElement.classList.add(theme);

          // For native Android: match the PWA viewport (768px)
          if (navigator.userAgent.indexOf("GroundWorkNative") !== -1) {
            document.documentElement.classList.add("native-android");
            var vp = document.getElementById("viewport-meta");
            if (vp) vp.setAttribute("content", "width=768, user-scalable=no, viewport-fit=cover");
          }
        } catch (e) {}
      })();
    </script>

    <link href="/src/index.css" rel="stylesheet" />
  </head>
  <body style="margin:0;background:#0f1117;">
    <div id="splash-loader" style="position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:#0f1117;">
      <img src="/icon/icon-192.png" alt="" style="width:80px;height:80px;border-radius:16px;animation:pulse 1.5s ease-in-out infinite;" />
      <style>@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.6;transform:scale(0.95)}}</style>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
