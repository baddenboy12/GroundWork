# /etc/nginx/sites-available/dev-groundwork
# nginx server block for dev.groundwork.teezfpo.com
#
# Mirrors the prod groundwork.teezfpo.com vhost but:
#   - serves /opt/groundwork/dist-dev/ instead of /opt/groundwork/dist/
#   - no PWA / service-worker considerations differ (the SW handles versioning)
#
# Install:
#   sudo cp scripts/nginx-dev-groundwork.conf /etc/nginx/sites-available/dev-groundwork
#   sudo ln -s /etc/nginx/sites-available/dev-groundwork /etc/nginx/sites-enabled/
#   sudo nginx -t
#   sudo systemctl reload nginx
#
# Then provision SSL:
#   sudo certbot --nginx -d dev.groundwork.teezfpo.com --redirect
#   (certbot will rewrite this file to add the listen 443 ssl block + cert paths)

server {
    listen 80;
    listen [::]:80;
    server_name dev.groundwork.teezfpo.com;

    # certbot --nginx will inject a 301 redirect to HTTPS here.
    # Keeping HTTP open before SSL is provisioned so the cert challenge succeeds.

    root /opt/groundwork/dist-dev;
    index index.html;

    # SPA fallback — every unmatched path serves index.html so
    # react-router can resolve client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache versioned assets (filenames are content-hashed by Vite)
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Service worker must NOT be cached aggressively or PWA updates break
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Slightly larger client_max_body_size for photo uploads.
    # Photos go directly to R2 via presigned URLs, but keep the limit
    # in sync with prod just in case anything ever proxies through.
    client_max_body_size 25M;
}
